<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sign in · Elementr</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: oklch(0.14 0.012 260);
  --bg-1: oklch(0.18 0.015 260);
  --bg-2: oklch(0.22 0.018 260);
  --bg-3: oklch(0.28 0.02 260);
  --fg-0: oklch(0.98 0.003 260);
  --fg-1: oklch(0.82 0.01 260);
  --fg-2: oklch(0.62 0.012 260);
  --fg-3: oklch(0.45 0.015 260);
  --line: oklch(1 0 0 / 0.08);
  --line-2: oklch(1 0 0 / 0.14);
  --accent: oklch(0.72 0.18 290);
  --accent-2: oklch(0.78 0.14 220);
  --error: oklch(0.7 0.2 20);
  --ok: oklch(0.78 0.15 150);
  --ease: cubic-bezier(.2,.8,.2,1);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg-0); color: var(--fg-0);
  font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: grid; place-items: center;
  padding: 32px;
  position: relative; overflow: hidden;
}
body::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, oklch(from var(--accent) l c h / 0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, oklch(from var(--accent-2) l c h / 0.18), transparent 40%);
  pointer-events: none;
  z-index: 0;
}
.shell { position: relative; z-index: 1; width: 100%; max-width: 400px; }
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; font-size: 17px;
  justify-content: center; margin-bottom: 28px;
  text-decoration: none; color: inherit;
}
.brand .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  box-shadow: 0 0 12px oklch(from var(--accent) l c h / 0.6);
}
.card {
  background: oklch(1 0 0 / 0.04);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border: 1px solid var(--line-2);
  border-radius: 20px;
  padding: 36px 30px;
}
h1 {
  font-size: 22px; font-weight: 600; letter-spacing: -0.015em;
  margin: 0 0 4px; text-align: center;
}
.sub {
  text-align: center; color: var(--fg-2); font-size: 14px;
  margin: 0 0 28px;
}
.field {
  display: block; margin-bottom: 14px;
}
.field label {
  display: block;
  font-family: "Geist Mono", monospace; font-size: 10.5px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--fg-2); margin-bottom: 6px;
}
.field input {
  width: 100%; padding: 12px 14px;
  background: var(--bg-1); color: var(--fg-0);
  border: 1px solid var(--line-2); border-radius: 10px;
  font-family: inherit; font-size: 15px;
  transition: border-color .2s;
}
.field input:focus {
  outline: none; border-color: var(--accent);
}
.btn {
  width: 100%; padding: 12px 18px;
  border-radius: 10px; border: none;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .2s var(--ease);
}
.btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #000;
  box-shadow: 0 4px 20px oklch(from var(--accent) l c h / 0.35);
}
.btn.primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 28px oklch(from var(--accent) l c h / 0.5);
}
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn.ghost {
  background: var(--bg-1); color: var(--fg-0);
  border: 1px solid var(--line-2);
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn.ghost:hover { background: var(--bg-2); border-color: var(--fg-3); }
.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 20px 0;
  font-family: "Geist Mono", monospace; font-size: 10px;
  letter-spacing: 0.14em; color: var(--fg-3);
  text-transform: uppercase;
}
.divider::before, .divider::after {
  content: ""; flex: 1; height: 1px; background: var(--line);
}
.msg {
  margin-top: 14px; padding: 11px 14px; border-radius: 10px;
  font-size: 13px; display: none;
}
.msg.err { background: oklch(from var(--error) l c h / 0.1); color: var(--error); border: 1px solid oklch(from var(--error) l c h / 0.3); }
.msg.ok { background: oklch(from var(--ok) l c h / 0.1); color: var(--ok); border: 1px solid oklch(from var(--ok) l c h / 0.3); }
.msg.show { display: block; }
.foot {
  text-align: center; margin-top: 20px;
  font-size: 12.5px; color: var(--fg-3);
}
.foot a { color: var(--fg-1); text-decoration: none; }
.foot a:hover { color: var(--fg-0); }
.plan-banner {
  display: none;
  padding: 10px 14px; margin-bottom: 20px;
  background: oklch(from var(--accent) l c h / 0.1);
  border: 1px solid oklch(from var(--accent) l c h / 0.3);
  border-radius: 10px;
  font-size: 13px; color: var(--fg-1);
  text-align: center;
}
.plan-banner.show { display: block; }
.plan-banner b { color: var(--accent); text-transform: capitalize; }
</style>
</head>
<body>
<div class="shell">
  <a href="/" class="brand"><span class="dot"></span>Elementr</a>
  <div class="card">
    <h1>Welcome</h1>
    <p class="sub">Sign in with your email or Google to continue.</p>
    <div class="plan-banner" id="planBanner">You'll be redirected to checkout for the <b id="planName"></b> plan after sign-in.</div>

    <button class="btn ghost" id="googleBtn" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.8 32.3 29.3 35.5 24 35.5c-6.4 0-11.5-5.1-11.5-11.5S17.6 12.5 24 12.5c2.9 0 5.6 1.1 7.7 2.9l5.7-5.7C33.8 6.2 29.2 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8c1.8-4.3 5.9-7.2 10.9-7.2 2.9 0 5.6 1.1 7.7 2.9l5.7-5.7C33.8 6.2 29.2 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.1 0 9.7-2 13.2-5.2l-6.1-5c-1.9 1.4-4.4 2.2-7.1 2.2-5.3 0-9.8-3.2-11.3-7.7l-6.6 5.1C9.6 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.7 2-2 3.7-3.8 4.9l6.1 5c-.4.4 6.4-4.7 6.4-13.9 0-1.2-.1-2.3-.4-3.5z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <form id="form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" minlength="6">
      </div>
      <button class="btn primary" type="submit" id="emailBtn">Sign in</button>
      <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12.5px">
        <button type="button" id="toggleMode" style="background:none;border:none;color:var(--fg-1);padding:0;cursor:pointer;text-decoration:underline;font-family:inherit">Create an account</button>
        <button type="button" id="forgotBtn" style="background:none;border:none;color:var(--fg-2);padding:0;cursor:pointer;font-family:inherit">Forgot password</button>
      </div>
    </form>

    <div class="msg err" id="errMsg"></div>
    <div class="msg ok" id="okMsg"></div>

    <div class="foot">
      By continuing, you agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
    </div>
  </div>
</div>

<script type="module">
import { sb, signInWithEmail, signInWithGoogle, getSession } from "/shared/supabase.js";

// If already logged in, skip straight to app (or intended `next`).
(async () => {
  const session = await getSession();
  if (session) {
    const next = new URLSearchParams(location.search).get("next") || "/app/";
    location.href = next;
  }
})();

// Show plan banner if ?plan=monthly or ?plan=forever
const params = new URLSearchParams(location.search);
const plan = params.get("plan");
if (plan && (plan === "monthly" || plan === "forever")) {
  document.getElementById("planName").textContent = plan;
  document.getElementById("planBanner").classList.add("show");
  sessionStorage.setItem("elementr-intent-plan", plan);
}

const err = document.getElementById("errMsg");
const ok  = document.getElementById("okMsg");
function showErr(m) { err.textContent = m; err.classList.add("show"); ok.classList.remove("show"); }
function showOk(m)  { ok.textContent = m; ok.classList.add("show"); err.classList.remove("show"); }

// Email + password auth
let mode = "signin"; // or "signup"
const toggle = document.getElementById("toggleMode");
const emailBtn = document.getElementById("emailBtn");
const forgotBtn = document.getElementById("forgotBtn");

function setMode(m) {
  mode = m;
  emailBtn.textContent = mode === "signin" ? "Sign in" : "Create account";
  toggle.textContent = mode === "signin" ? "Create an account" : "Back to sign in";
  document.querySelector('h1').textContent = mode === "signin" ? "Welcome back" : "Create account";
  err.classList.remove("show"); ok.classList.remove("show");
}
toggle.addEventListener("click", () => setMode(mode === "signin" ? "signup" : "signin"));

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if (!email || !password) return;
  emailBtn.disabled = true;
  emailBtn.textContent = mode === "signin" ? "Signing in…" : "Creating…";

  let result;
  if (mode === "signin") {
    result = await sb.auth.signInWithPassword({ email, password });
  } else {
    result = await sb.auth.signUp({
      email, password,
      options: { emailRedirectTo: `${location.origin}/auth/callback.html` }
    });
  }
  emailBtn.disabled = false;
  emailBtn.textContent = mode === "signin" ? "Sign in" : "Create account";

  if (result.error) {
    showErr(result.error.message || "Something went wrong.");
    return;
  }

  if (mode === "signup" && !result.data.session) {
    showOk("Check your inbox to confirm your email, then sign in.");
    return;
  }

  // Signed in — redirect
  const next = new URLSearchParams(location.search).get("next") || "/app/";
  const intentPlan = sessionStorage.getItem("elementr-intent-plan");
  sessionStorage.removeItem("elementr-intent-plan");
  if (intentPlan === "monthly" || intentPlan === "forever") {
    location.href = `/app/?checkout=${intentPlan}`;
  } else {
    location.href = next;
  }
});

// Forgot password — send a reset link
forgotBtn.addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  if (!email) { showErr("Enter your email first."); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: `${location.origin}/auth/callback.html`
  });
  if (error) showErr(error.message);
  else showOk("Password reset link sent to your inbox.");
});

// Google OAuth
document.getElementById("googleBtn").addEventListener("click", async () => {
  const { error } = await signInWithGoogle();
  if (error) showErr(error.message || "Google sign-in failed.");
});
</script>
</body>
</html>
